spring.application.name=rewardhub

spring.datasource.url=jdbc:mysql://localhost:3306/rewardhub
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Schema is owned by Flyway migrations (src/main/resources/db/migration).
# Hibernate must never alter the schema — it only validates entities against it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.profiles.active=local

# Emit RFC 7807 application/problem+json for Spring MVC errors too.
spring.mvc.problemdetails.enabled=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
